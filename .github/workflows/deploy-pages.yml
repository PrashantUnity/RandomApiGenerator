name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "public/codefrydev-icon.svg"
      - ".github/workflows/deploy-pages.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync icon into docs (matches repo root branding)
        run: cp -f public/codefrydev-icon.svg docs/codefrydev-icon.svg

      - name: Inject repository for links and API
        run: |
          repo="${{ github.repository }}"
          sed -i "s|__GITHUB_REPOSITORY__|${repo}|g" docs/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
