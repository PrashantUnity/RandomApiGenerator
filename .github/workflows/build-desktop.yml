name: Build desktop

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (Windows portable .exe)
        run: npm run build && npx electron-builder --win portable --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: RandomApiGenerator-windows-exe
          path: release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (macOS .dmg)
        run: npm run build && npx electron-builder --mac dmg --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: RandomApiGenerator-macos-dmg
          path: release/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build app (Linux AppImage)
        run: npm run build && npx electron-builder --linux AppImage --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: RandomApiGenerator-linux-AppImage
          path: release/*.AppImage

  # GitHub "Releases" only show items created as Releases — not workflow artifacts.
  # This job runs when you push a tag like v1.0.0 and attaches the three builds to that release.
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) -exec cp -f {} release-assets/ \;
          ls -la release-assets

      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
