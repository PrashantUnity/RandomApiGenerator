name: Build desktop

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (Windows portable .exe)
        run: npm run build && npx electron-builder --win portable --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: RandomApiGenerator-windows-exe
          path: release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (macOS .dmg)
        run: npm run build && npx electron-builder --mac dmg --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: RandomApiGenerator-macos-dmg
          path: release/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build app (Linux AppImage)
        run: npm run build && npx electron-builder --linux AppImage --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: RandomApiGenerator-linux-AppImage
          path: release/*.AppImage
